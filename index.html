<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Gartic Cryptic Engine</title>
<style>
body { font-family: sans-serif; padding: 15px; background: #fff; color: #000; }
.hidden { display: none !important; }
.panel { border: 2px solid #000; padding: 15px; border-radius: 5px; margin-bottom: 15px; }
input { padding: 8px; width: 100%; max-width: 250px; margin-top: 5px; display: block; border: 2px solid #000; }
button { padding: 10px 20px; margin-top: 10px; cursor: pointer; background: #fff; border: 2px solid #000; font-weight: bold; }
.clue-tag { display: inline-block; background: #eee; border: 1px solid #000; padding: 5px 10px; margin: 5px; border-radius: 3px; font-weight: bold; }
table, th, td { border: 1px solid #000; border-collapse: collapse; padding: 6px; text-align: center; }
.timer-box { font-size: 20px; font-weight: bold; color: #e11d48; margin-top: 10px; }
.chat-box { border: 2px solid #000; height: 180px; overflow-y: auto; padding: 8px; margin-bottom: 10px; background: #fafafa; font-size: 14px; }
.c-msg { margin-bottom: 4px; padding: 2px; }
.c-system { color: #856404; background: #fff3cd; font-weight: bold; }
.c-close { color: #d94111; background: #ffe8cc; font-weight: bold; }
.c-success { color: #155724; background: #d4edda; font-weight: bold; }
</style>
<script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="setupScreen">
<h3>GARTIC MULTIPLAYER GİRİŞ</h3>
<label>Kullanıcı Adınız:</label>
<input type="text" id="usernameInput" value="Oyuncu">
<button id="startBtn">Oyuna Katıl</button>
</div>

<div id="gameScreen" class="hidden">

<div class="panel">
<h2 id="turnInfo">ANLATICININ SIRASI</h2>
<p id="secretDisplay" style="color: red; font-weight: bold;"></p>
<div id="timerDisplay" class="timer-box">Kalan Süre: 05:00</div>
</div>

<div class="panel">
<h3>✍️ İpucu Alanı (Sadece Anlatıcı)</h3>
<input type="text" id="clueInput" placeholder="İpucu yazıp boşluk bırakın...">
<div id="cluePool" style="margin-top: 10px;"></div>
</div>

<div class="panel">
<h3>💬 Canlı Sohbet ve Tahmin Ekranı</h3>
<div id="chatDisplay" class="chat-box"></div>
<input type="text" id="guessInput" placeholder="Tahmininizi yazıp boşluk bırakın...">
</div>

<div class="panel">
<h3>📊 Canlı Skor Tablosu</h3>
<table>
<thead><tr id="tHead"></tr></thead>
<tbody><tr id="tBody"></tr></tbody>
</table>
</div>

</div>

<script>
const socket = io();

const setupScreen = document.getElementById('setupScreen');
const gameScreen = document.getElementById('gameScreen');
const startBtn = document.getElementById('startBtn');
const usernameInput = document.getElementById('usernameInput');
const turnInfo = document.getElementById('turnInfo');
const secretDisplay = document.getElementById('secretDisplay');
const timerDisplay = document.getElementById('timerDisplay');
const clueInput = document.getElementById('clueInput');
const cluePool = document.getElementById('cluePool');
const chatDisplay = document.getElementById('chatDisplay');
const guessInput = document.getElementById('guessInput');
const tHead = document.getElementById('tHead');
const tBody = document.getElementById('tBody');

let isMyTurn = false;

startBtn.addEventListener('click', () => {
    const nick = usernameInput.value.trim();
    socket.emit('joinGame', nick);
    setupScreen.classList.add('hidden');
    gameScreen.classList.remove('hidden');
});

function logSystem(text, className) {
    chatDisplay.innerHTML += '<div class="c-msg ' + className + '">' + text + '</div>';
    chatDisplay.scrollTop = chatDisplay.scrollHeight;
}

function handleSpace(inputElement, eventName) {
    let val = inputElement.value;
    if (val.includes(' ') || val.includes('\n') || /[\s\n]$/.test(val)) {
        let clean = val.replace(/[\s\n]/g, '').trim();
        if (clean.length > 0) {
            socket.emit(eventName, clean);
        }
        inputElement.value = "";
    }
}

clueInput.addEventListener('input', () => handleSpace(clueInput, 'sendClue'));
guessInput.addEventListener('input', () => handleSpace(guessInput, 'sendGuess'));

// SUNUCUDAN GELEN OLAYLAR (SOCKET LISTENERS)
socket.on('timerUpdate', (timeLeft) => {
    let min = Math.floor(timeLeft / 60);
    let sec = timeLeft % 60;
    timerDisplay.textContent = "Kalan Süre: " + (min < 10 ? '0'+min : min) + ":" + (sec < 10 ? '0'+sec : sec);
});

socket.on('systemMessage', (data) => {
    logSystem(data.text, data.type);
});

socket.on('chatMessage', (data) => {
    logSystem(data.name + ": " + data.text, "");
});

socket.on('clueReceived', (clue) => {
    cluePool.innerHTML += '<span class="clue-tag">' + clue + '</span>';
});

socket.on('newRound', (data) => {
    cluePool.innerHTML = "";
    chatDisplay.innerHTML = "";
    isMyTurn = (socket.id === data.narratorId);
    
    turnInfo.textContent = "ANLATICININ SIRASI (" + data.narratorName.toUpperCase() + ")";
    
    if (isMyTurn) {
        secretDisplay.textContent = "Tahmin Edilecek Gizli Kelime Sende: (Sunucu Kelimesi)";
        clueInput.disabled = false;
    } else {
        secretDisplay.textContent = data.narratorName + " anlatıyor. İpuçlarından kelimeyi bul!";
        clueInput.disabled = true;
    }
});

socket.on('syncRound', (data) => {
    turnInfo.textContent = "ANLATICININ SIRASI (" + data.narratorName.toUpperCase() + ")";
    isMyTurn = (socket.id === data.narratorId);
    clueInput.disabled = !isMyTurn;
    secretDisplay.textContent = isMyTurn ? "Anlatıcı sensin." : data.narratorName + " anlatıyor.";
});

socket.on('updatePlayers', (players) => {
    let headHtml = "";
    let bodyHtml = "";
    players.forEach(p => {
        headHtml += '<th>' + p.name + '</th>';
        bodyHtml += '<td>' + p.score + ' Puan</td>';
    });
    tHead.innerHTML = headHtml;
    tBody.innerHTML = bodyHtml;
});
</script>
</body>
</html>
